<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 44" width="210" height="44" role="img" aria-label="Mini Forge Dev logo">
  <defs>
    <linearGradient id="anv-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB35C"/>
      <stop offset="100%" stop-color="#E5621E"/>
    </linearGradient>
    <linearGradient id="anv-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D15B1A"/>
      <stop offset="100%" stop-color="#A84010"/>
    </linearGradient>
    <radialGradient id="glow-bg" cx="50%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#FF8A3D" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF8A3D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow halo behind anvil -->
  <ellipse cx="22" cy="34" rx="20" ry="10" fill="url(#glow-bg)"/>

  <!-- Anvil top face -->
  <rect x="3" y="13" width="36" height="10" rx="3" fill="url(#anv-top)"/>
  <!-- Anvil horn (right) -->
  <path d="M36 15 L44 19 L36 22" fill="#FFB35C" stroke="#E5921E" stroke-width="0.5" stroke-linejoin="round"/>
  <!-- Anvil waist -->
  <rect x="9" y="23" width="22" height="6" rx="1.5" fill="url(#anv-body)"/>
  <!-- Anvil base -->
  <rect x="6" y="29" width="28" height="5" rx="2" fill="#8E3610"/>

  <!-- Code bracket on top face -->
  <text x="5" y="21" font-family="'Courier New',Courier,monospace" font-size="8" font-weight="900" fill="#090B10" opacity="0.85">&lt;/&gt;</text>

  <!-- Spark particles -->
  <circle cx="14" cy="9"  r="1.8" fill="#FFB35C" opacity="0.9"/>
  <circle cx="23" cy="5"  r="1.2" fill="#FF8A3D" opacity="0.8"/>
  <circle cx="30" cy="8"  r="1.4" fill="#FFB35C" opacity="0.7"/>
  <circle cx="9"  cy="10" r="1.0" fill="#FF8A3D" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="54" y="21" font-family="Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#F7F8FC" letter-spacing="-0.3">Mini Forge</text>
  <text x="54" y="36" font-family="Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="500" fill="#AAB3C5" letter-spacing="2.5">DEV</text>
</svg>
