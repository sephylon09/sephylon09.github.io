<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44" role="img" aria-label="Mini Forge Dev">
  <defs>
    <linearGradient id="fav-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB35C"/>
      <stop offset="100%" stop-color="#E5621E"/>
    </linearGradient>
    <radialGradient id="fav-glow" cx="50%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#FF8A3D" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF8A3D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="44" height="44" rx="10" fill="#121722"/>
  <ellipse cx="22" cy="36" rx="18" ry="8" fill="url(#fav-glow)"/>
  <!-- Anvil top -->
  <rect x="4" y="14" width="36" height="10" rx="3" fill="url(#fav-top)"/>
  <!-- Horn -->
  <path d="M36 16 L43 20 L36 23" fill="#FFB35C"/>
  <!-- Waist -->
  <rect x="10" y="24" width="22" height="6" rx="1.5" fill="#D15B1A"/>
  <!-- Base -->
  <rect x="7" y="30" width="28" height="5" rx="2" fill="#8E3610"/>
  <!-- Code text -->
  <text x="6" y="22" font-family="'Courier New',monospace" font-size="8" font-weight="900" fill="#090B10" opacity="0.8">&lt;/&gt;</text>
  <!-- Sparks -->
  <circle cx="14" cy="10" r="2"   fill="#FFB35C" opacity="0.9"/>
  <circle cx="24" cy="6"  r="1.5" fill="#FF8A3D" opacity="0.8"/>
  <circle cx="31" cy="9"  r="1.2" fill="#FFB35C" opacity="0.7"/>
</svg>
